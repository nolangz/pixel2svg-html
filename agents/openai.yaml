interface:
  display_name: "Pixel2SVG-HTML"
  short_description: "Fit raster logos into smooth minimal SVG and 0.7x JS-rendered HTML with overlay QA and a 10-iteration budget."
  default_prompt: "Use $pixel2svg-html to fit this raster logo into clean SVG and standalone JS-rendered HTML when no animation is requested. If the user asks for atomic motions, tuners/controllers, a main animation, or logo animation showcase HTML, switch to $pixel2motion instead. Measure the source first and read the fitting playbook, decide the provisional geometry complexity from the image itself, start with the lowest-complexity smooth model that can plausibly match it, and escalate only when the overlay proves it is needed. Fit boundaries directly against source-measured edge points, keep G1 continuity (bisector repair for small tangent gaps, bridge segments across curvature spikes), audit Bezier paths for segment count and smoothness, and optimize IoU as high as practical without using a fixed global IoU threshold. Cap fitting at 10 iterations by default; stop when either an accepted smooth/structural/visual fit is reached or the 10-iteration budget is exhausted. If a lower-IoU smooth candidate ships over a higher-IoU jagged candidate, disclose why the residuals are acceptable and keep fit state resumable. Render the JS HTML at 0.7x intrinsic SVG width in a real browser, visually inspect the final overlay and HTML screenshot, save current-run overlays, final render, HTML render, progress strip, and resumable fit state under outputs/fit_work/."
